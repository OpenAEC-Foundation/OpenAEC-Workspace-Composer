name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            args: ""
            artifact: "*.msi,*.exe"

          - label: macos-universal
            os: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact: "*.dmg"

          - label: linux-x64
            os: ubuntu-22.04
            args: ""
            artifact: "*.deb,*.AppImage"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenAEC Workspace Composer ${{ github.ref_name }}"
          releaseBody: |
            ## OpenAEC Workspace Composer ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | Windows | `.msi` or `.exe` |
            | macOS (Intel + Apple Silicon) | `.dmg` |
            | Linux | `.deb` or `.AppImage` |

            ### What's new
            See [CHANGELOG](https://github.com/OpenAEC-Foundation/OpenAEC-Workspace-Composer/blob/master/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
